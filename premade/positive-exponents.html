    <div id="site-header-mount"></div>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="hero premade-quiz-hero" aria-labelledby="premade-title">
        <h1 id="premade-title">Positive Exponents Quiz</h1>
        <p class="subtitle">Practice powers like 2^3, 4^2 and exponent rules.</p>
        <p><a class="premade-back-link" href="../premade-quiz.html" data-i18n="premade.backToCards">Back to topic cards</a></p>
      </section>

      <section id="premadeQuizPanel" class="panel premade-quiz-panel" aria-label="Pre-made quiz">
        <div class="quiz-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="premadeProgressBar">
          <span id="premadeProgressFill" class="quiz-progress-fill"></span>
        </div>

        <div class="premade-quiz-meta">
          <p id="premadeQuestionCount" class="premade-question-count" data-i18n="premade.questionCount" data-i18n-current="1" data-i18n-total="10">Question 1 / 10</p>

        </div>

        <h2 id="premadeQuestionText" class="quiz-question premade-question" data-i18n="premade.loadingQuestion">Loading question...</h2>
        <div id="premadeChoices" class="quiz-choices" aria-live="polite"></div>

        <div class="button-row premade-actions">
          <button id="premadeSubmitBtn" class="btn quiz-answer-btn" type="button" disabled data-i18n="premade.checkAnswer">Check Answer</button>
          <button id="premadeNextBtn" class="btn btn-ghost" type="button" disabled data-i18n="premade.nextQuestion">Next Question</button>
        </div>

        <p id="premadeFeedback" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <div id="premadeDifficultyModal" class="quiz-modal" role="dialog" aria-modal="true" aria-labelledby="premadeDifficultyTitle" hidden>

        <p data-i18n="premade.diffText">Select how hard you want this quiz to be.</p>
        <div class="quiz-modal-actions premade-mode-actions">
          <button class="btn" type="button" data-mode="easy" data-i18n="premade.diff.easy">Easy</button>
          <button class="btn" type="button" data-mode="medium" data-i18n="premade.diff.medium">Medium</button>
          <button class="btn" type="button" data-mode="hard" data-i18n="premade.diff.hard">Hard</button>
          <button id="premadeDifficultyCancel" class="btn btn-ghost" type="button" data-i18n="premade.cancel">Cancel</button>
        </div>
